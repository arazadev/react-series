<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Custom React</title>
    
</head>

<body>

    <!--
        This is the container where our custom React renderer
        will insert (render) HTML elements.
    -->
    <div id="root"></div>

    <!--
        Loads our JavaScript file.
        The browser executes this file after reading the HTML.
    -->
    <script src="customReact.js"></script>

</body>
</html>
